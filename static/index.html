<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Ensemble</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">⛅ WeatherEnsemble</h1>
        <p class="tagline">ECMWF · GFS · ICON · GEM — combined</p>
      </div>
    </header>

    <section class="search-section">
      <div class="search-wrapper">
        <input
          id="search-input"
          type="text"
          placeholder="Search city or location…"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="search-btn" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
        <button id="locate-btn" aria-label="Use my location" title="Use my location">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/>
            <circle cx="12" cy="12" r="8" stroke-dasharray="2 4"/>
          </svg>
        </button>
        <ul id="suggestions" class="suggestions" role="listbox" aria-label="Location suggestions"></ul>
      </div>
    </section>

<div id="error-msg" class="error-msg" hidden></div>
<div id="loading-msg" class="loading-msg" hidden>Loading weather data…</div>

    <main id="weather-content" hidden>

      <!-- Current weather -->
      <section class="card current-card">
        <div class="current-top">
          <div>
            <h2 id="location-name" class="location-name"></h2>
            <p id="location-time" class="location-time"></p>
          </div>
          <div class="unit-toggle">
            <button id="unit-c" class="unit-btn active">°C</button>
            <button id="unit-f" class="unit-btn">°F</button>
          </div>
        </div>

        <div class="current-body">
          <div class="current-icon" id="current-icon"></div>
          <div class="current-temps">
            <span id="current-temp" class="current-temp"></span>
            <span id="current-desc" class="current-desc"></span>
          </div>
        </div>

        <div class="current-details">
          <div class="detail">
            <span class="detail-label">Feels like</span>
            <span id="feels-like" class="detail-value"></span>
          </div>
          <div class="detail">
            <span class="detail-label">Wind</span>
            <span id="wind-speed" class="detail-value"></span>
          </div>
          <div class="detail">
            <span class="detail-label">Humidity</span>
            <span id="humidity" class="detail-value"></span>
          </div>
          <div class="detail">
            <span class="detail-label">Precipitation</span>
            <span id="precipitation" class="detail-value"></span>
          </div>
          <div class="detail">
            <span class="detail-label">Models</span>
            <span id="models-used" class="detail-value"></span>
          </div>
          <div class="detail">
            <span class="detail-label">Confidence</span>
            <span id="confidence" class="confidence-badge"></span>
          </div>
        </div>
      </section>

      <!-- 7-day forecast -->
      <section class="card">
        <h3 class="section-title">7-Day Forecast</h3>
        <div id="forecast-list" class="forecast-list"></div>
      </section>

      <!-- Temperature chart -->
      <section class="card">
        <div class="chart-header">
          <h3 class="section-title">Temperature Over Time</h3>
          <div class="range-toggle">
            <button class="range-btn active" data-range="12h">12 h</button>
            <button class="range-btn" data-range="24h">24 h</button>
            <button class="range-btn" data-range="48h">48 h</button>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="temp-chart"></canvas>
        </div>
      </section>

      <!-- Temp table -->
      <section class="card">
        <h3 class="section-title">Temperature Table</h3>
        <div id="temp-table-wrap" class="temp-table-wrap"></div>
      </section>

      <!-- Model breakdown -->
      <section class="card">
        <h3 class="section-title">Model Breakdown — Now</h3>
        <div id="model-grid" class="model-grid"></div>
        <div id="model-detail" class="model-detail" hidden>
          <canvas id="model-chart"></canvas>
        </div>
      </section>

    </main>
  </div>

  <script src="chart.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
