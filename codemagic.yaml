workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - aaa
      vars:
        XCODE_SCHEME: App
        BUNDLE_ID: com.weatherensemble.app
      node: latest

    scripts:
      - name: Install Capacitor dependencies
        script: npm install

      - name: Add iOS platform
        script: |
          rm -rf ios
          npx cap add ios

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Add location permissions to Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Weather Ensemble needs your location to show local weather.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'Weather Ensemble needs your location to show local weather.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'Weather Ensemble needs your location to show local weather.'" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription 'Weather Ensemble needs your location to show local weather.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"

      - name: Install CocoaPods
        script: cd ios/App && pod install

      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build iOS (App Store)
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive | xcpretty

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
