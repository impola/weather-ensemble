workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - aaa
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.weatherensemble.app
      vars:
        XCODE_SCHEME: App
        BUNDLE_ID: com.weatherensemble.app
      node: latest

    scripts:
      - name: Install Capacitor dependencies
        script: npm install

      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: cd ios/App && pod install

      - name: Set build number
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID") + 1))
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build iOS (App Store)
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive | xcpretty

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false   # set to true when ready for full release
